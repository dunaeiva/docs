meta:
  title: '{{ ai-studio-full-name }}'
  description: >-
    {{ ai-studio-full-name }} — это платформа {{ yandex-cloud }} для создания
    AI-приложений и AI-агентов на базе больших генеративных моделей. {{
    ai-studio-name }} предоставляет все необходимое для всех этапов от
    экспериментов и прототипирования до промышленного внедрения разработок.
  sharing:
    title: '{{ ai-studio-full-name }}'
    description: >-
      {{ ai-studio-full-name }} — это платформа {{ yandex-cloud }} для создания
      AI-приложений и AI-агентов на базе больших генеративных моделей.
    image: _assets/ai-studio/index/images/ru_share_doc.jpg
  keywords:
    - keyword: '{{ ai-studio-full-name }}'
    - keyword: '{{ ai-studio-name }}'
    - keyword: сервис {{ ai-studio-name }}
    - keyword: генеративные модели для бизнеса
    - keyword: нейросети в {{ yandex-cloud }}
    - keyword: учебник промптинга
    - keyword: YandexGPT Lite
    - keyword: YandexGPT Pro
    - keyword: YandexART
    - keyword: AI-ассистент
    - keyword: AI-агент
    - keyword: технологии машинного обучения
    - keyword: генеративные модели в {{ yandex-cloud }}
    - keyword: нейросети в бизнес-приложениях
    - keyword: нейросети в веб-сервисах
    - keyword: нейросети в бизнесе
blocks:
  - type: header-block
    title: "Документация AI\_Studio"
    centered: true
    width: l
    offset: l
    indent:
      top: xl
      bottom: l
    background:
      image:
        desktop: _assets/ai-studio/index/images/doc_header.jpg
        mobile: _assets/ai-studio/index/images/doc_header_mobile.jpg
  - type: card-layout-block
    colSizes:
      all: 12
      sm: 6
      md: 6
      lg: 3
    children:
      - type: basic-card
        title: Начало работы
        text: "Получите API-ключ и\_начните работу в\_AI\_Studio"
        icon: _assets/ai-studio/index/icons/rocket.svg
        urlTitle: Начало работы
        url: ai-studio/quickstart/index.md
        centered: true
        size: s
        border: none
        backgroundColor: '#EAEBE0'
      - type: basic-card
        title: Правила тарификации
        text: "Цены и\_правила расчета стоимости услуг"
        icon: _assets/ai-studio/index/icons/tag-ruble.svg
        urlTitle: Правила тарификации
        url: ai-studio/pricing.md
        centered: true
        size: s
        border: none
        backgroundColor: '#EAEBE0'
      - type: basic-card
        title: Квоты и лимиты
        text: "Технические и\_организационные ограничения"
        icon: _assets/ai-studio/index/icons/sliders.svg
        urlTitle: Квоты и лимиты
        url: ai-studio/concepts/limits.md
        centered: true
        size: s
        border: none
        backgroundColor: '#EAEBE0'
      - type: basic-card
        title: История изменений
        text: "Обновления и\_релизы"
        icon: _assets/ai-studio/index/icons/timeline.svg
        urlTitle: История изменений
        url: ai-studio/release-notes/index.md
        centered: true
        size: s
        border: none
        backgroundColor: '#EAEBE0'
  - type: card-layout-block
    colSizes:
      all: 12
      lg: 4
      md: 6
      sm: 6
    background:
      light:
        style:
          backgroundColor: '#004D59'
    title: Платформа AI Studio
    centered: true
    children:
      - type: basic-card
        title: Model Gallery
        text: Большие генеративные модели
        urlTitle: Model Gallery
        url: ai-studio/concepts/generation/index.md
        size: s
      - type: basic-card
        title: Agent Atelier
        text: "Создание решений на\_базе\_ИИ"
        urlTitle: Agent Atelier
        url: ai-studio/concepts/agents/index.md
        size: s
      - type: basic-card
        title: AI Search
        text: "Корпоративный поиск и\_ответы по\_данным"
        urlTitle: AI Search
        url: ai-studio/concepts/search/index.md
        size: s
      - type: basic-card
        title: MCP Hub
        text: Серверы для агентов
        urlTitle: MCP Hub
        url: ai-studio/concepts/mcp-hub/index.md
        size: s
      - type: basic-card
        title: Yandex SpeechKit
        text: "Синтез и\_распознавание речи"
        urlTitle: Yandex SpeechKit
        url: speechkit/overview.md
        size: s
      - type: basic-card
        title: "Yandex Search\_API"
        text: "API поиска в\_интернете"
        urlTitle: Yandex Search API
        url: search-api/concepts/index.md
        size: s
      - type: basic-card
        title: Yandex Workflows
        text: Визуальный конструктор процессов
        urlTitle: Yandex Workflows
        url: >-
          https://yandex.cloud/ru/docs/serverless-integrations/concepts/workflows/workflow
        size: s
      - type: basic-card
        title: Yandex Vision OCR
        text: Компьютерное зрение
        urlTitle: Yandex Vision OCR
        url: vision/concepts/ocr/index.md
        size: s
      - type: basic-card
        title: Yandex Translate
        text: Машинный перевод
        urlTitle: Yandex Translate
        url: translate/concepts/index.md
        size: s
  - type: card-layout-block
    colSizes:
      all: 12
      sm: 6
      md: 6
    background: ''
    title: "Операционные сервисы Yandex\_Cloud"
    centered: false
    children:
      - type: basic-card
        title: Биллинг
        text: "Информация о расходах и\_оплата потребления"
        urlTitle: Yandex Cloud Billing
        url: https://yandex.cloud/ru/docs/billing/
        icon: _assets/ai-studio/index/icons/sliders.svg
        size: s
        border: none
      - type: basic-card
        title: Identity and Access Management
        text: "Идентификация и\_контроль доступа к\_облачным ресурсам"
        urlTitle: Yandex Identity and Access Management
        url: https://yandex.cloud/ru/docs/iam/
        icon: _assets/ai-studio/index/icons/persons-lock.svg
        size: s
        border: none
      - type: basic-card
        title: Безопасность в Yandex Cloud
        text: "Рекомендации по\_построению безопасных приложений и\_бюллетени безопасности"
        urlTitle: Безопасность в Yandex Cloud
        url: https://yandex.cloud/ru/docs/security/
        icon: _assets/ai-studio/index/icons/shield-check.svg
        size: s
        border: none
      - type: basic-card
        title: Описание технической поддержки
        text: "Узнайте, как и\_с\_какими запросами можно обратиться в\_поддержку"
        urlTitle: Описание технической поддержки Yandex Cloud
        url: https://yandex.cloud/ru/docs/support/
        icon: _assets/ai-studio/index/icons/person-gear.svg
        size: s
        border: none
  - type: content-layout-block
    textContent:
      title: "Решения на базе AI\_Studio"
    size: l
    indent:
      top: l
      bottom: '0'
  - type: content-layout-block
    indent:
      top: s
      bottom: '0'
    background:
      src: _assets/ai-studio/index/images/speechsense.jpg
      style:
        backgroundColor: '#EBEBE0'
    textContent:
      title: Yandex SpeechSense
      text: "Сервис для глубокого анализа голосовых и\_текстовых каналов коммуникаций"
      buttons:
        - text: Подробнее о решении
          url: https://yandex.cloud/ru/docs/speechsense
          theme: action
    size: l
  - type: card-layout-block
    indent:
      top: l
      bottom: xl
    title:
      text: Условия использования сервисов
      size: sm
    description: "Инфраструктура Yandex\_Cloud защищена в\_соответствии с Федеральным законом Российской Федерации «О\_персональных данных» № 152-ФЗ.\nДля сервисов действует [соглашение об уровне обслуживания](https://yandex.ru/legal/cloud_sla)."
    colSizes:
      all: 12
      xl: 6
      lg: 6
      md: 6
      sm: 12
    children:
      - type: basic-card
        border: line
        noBackground: true
        size: s
        icon: _assets/ai-studio/index/icons/file-check.svg
        text: "\nУровни обслуживания сервисов определены в\_следующих документах:\n\n* [Уровень обслуживания сервиса Yandex AI Studio](https://yandex.ru/legal/cloud_sla_yandex_ai_studio).\n* [Уровень обслуживания сервиса Yandex SpeechKit](https://yandex.ru/legal/cloud_sla_speechkit).\n* [Уровень обслуживания сервиса Yandex Search API](https://yandex.ru/legal/cloud_sla_search_api).\n* [Уровень обслуживания сервиса Yandex Translate](https://yandex.ru/legal/cloud_sla_translate).\n* [Уровень обслуживания сервиса Yandex Vision OCR](https://yandex.ru/legal/cloud_sla_vision).\n"
      - type: basic-card
        border: line
        noBackground: true
        size: s
        icon: _assets/ai-studio/index/icons/file-check.svg
        text: "Дополнительно к [Условиям использования Yandex\_Cloud](https://yandex.ru/legal/cloud_oferta) действуют:\n  \n* [Условия использования сервиса Yandex AI Studio](https://yandex.ru/legal/cloud_terms_yandex_ai_studio).\n* [Условия использования сервиса Yandex SpeechKit](https://yandex.ru/legal/cloud_terms_speechkit).\n* [Условия использования сервиса Yandex Search API](https://yandex.ru/legal/cloud_terms_search_api).\n* [Уровень использования сервиса Yandex Translate](https://yandex.ru/legal/cloud_terms_translate).\n* [Уровень использования сервиса Yandex Vision OCR](https://yandex.ru/legal/cloud_terms_vision).\n"
links: []
