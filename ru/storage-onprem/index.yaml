title: '{{ objstorage-onprem-name }}'
description:
  - >-
    Продукт {{ objstorage-onprem-name }} — это универсальное масштабируемое
    решение для хранения данных. Оно подходит как для высоконагруженных
    продуктов, которым требуется надежный и быстрый доступ к данным, так и для
    проектов с невысокими требованиями к инфраструктуре хранения.
  - >-
    В терминах {{ objstorage-name }} файлы и папки — это объекты. Все объекты
    размещаются в бакетах. Структура хранения объектов в бакете плоская, но
    инструменты с графическим интерфейсом предлагают работать с {{
    objstorage-name }} как с иерархической файловой системой.
  - >-
    Используя {{ objstorage-name }}, вы можете:  <ul><li>Хранить данные
    произвольного формата как объекты с доступом по текстовому
    идентификатору.</li> <li>Использовать различные классы хранилища для
    объектов и управлять их жизненным циклом.</li> <li>Хранить большие объекты
    размером в несколько терабайт.</li> <li>Опубликовать статический
    сайт.</li></ul>
  - >-
    HTTP API продукта совместим с API AWS S3, то есть для работы с {{
    objstorage-name }} вы можете использовать множество инструментов, созданных
    для работы с объектными хранилищами S3.
  - >-
    Документация версионируется и соответствует конкретной версии {{
    objstorage-onprem-name }}.
